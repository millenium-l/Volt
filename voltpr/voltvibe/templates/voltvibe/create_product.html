{% extends 'base.html' %}
{% load static %}

{% block content %}\

<style>
    .card {
  border-radius: 12px;
}

.form-control, .form-select {
  border-radius: 8px;
}
</style>


<div class="container py-5">
  <div class="row justify-content-center">
    
    <div class="col-12 col-md-8 col-lg-6">
      
      <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">

          <h4 class="mb-4 fw-semibold text-center">Create Product <hr></h4>

          <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Name -->
            <div class="mb-3">
              <label for="{{ form.name.id_for_label }}" class="form-label">Product Name</label>
              {{ form.name }}
            </div>

            <!-- Price -->
            <div class="mb-3">
              <label for="{{ form.price.id_for_label }}" class="form-label">Price</label>
              {{ form.price }}
            </div>

            <!-- Image -->
            <div class="mb-3">
              <label for="{{ form.image.id_for_label }}" class="form-label">Product Image</label>
              {{ form.image }}
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label for="{{ form.category.id_for_label }}" class="form-label">Category</label>
              {{ form.category }}
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label for="{{ form.description.id_for_label }}" class="form-label">Short Description</label>
              {{ form.description }}
            </div>

            <!-- Detailed Description -->
            <div class="mb-4">
              <label for="{{ form.detailed_description.id_for_label }}" class="form-label">Detailed Description</label>
              {{ form.detailed_description }}
            </div>

            <!-- Submit -->
            <div class="d-grid">
              <button type="submit" class="btn btn-dark">
                Create Product
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>

  </div>
</div>
{% endblock content %}
